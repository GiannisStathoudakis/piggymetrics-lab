---
- hosts: master
  become: true
  vars:
    admin_user: "{{ ansible_user | default('ubuntu') }}"

  tasks:
    - name: 01. Install updates for Ubuntu
      tags: always
      ansible.builtin.apt:
        upgrade: dist
        update_cache: yes
        autoremove: yes

    - name: 02. Disable UFW Firewall
      ansible.builtin.systemd:
        name: ufw
        state: stopped
        enabled: false
      
    - name: 03. Disable swap
      ansible.builtin.command: swapoff -a
      when: ansible_swaptotal_mb > 0

    - name: 04. Disable swap permanently
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#\n]*?\sswap\s+.*)$'
        replace: '# \1'
    
    - name: 05. Install WireGuard + Longhorn packages
      ansible.builtin.apt:
        name:
          - wireguard # for Cilium
          - wireguard-tools # for Cilium
          - open-iscsi # for Longhorn
          - nfs-common # for Longhorn
        state: present
    
    - name: 06. Load kernel modules on boot
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter
        mode: '0644'

    - name: 07. Load kernel modules immediately
      ansible.builtin.command: modprobe {{ item }}
      loop:
        - overlay
        - br_netfilter
      changed_when: false
    

    - name: 08. Create rke2 directory
      ansible.builtin.file:
        path: /etc/rancher/rke2
        state: directory
        mode: '0755'
    
    - name: 09. Write RKE2 master configuration file
      ansible.builtin.copy:
        dest: /etc/rancher/rke2/config.yaml
        content: |
          write-kubeconfig-mode: "0644"
          cni: cilium
          disable:
            - rke2-ingress-nginx
            - rke2-traefik
            - rke2-servicelb
            - rke2-metrics-server
        mode: '0600'
    
    - name: 10. Download and execute rke2
      ansible.builtin.shell: |
        curl -sfL https://get.rke2.io | sh
      args:
        creates: /usr/local/bin/rke2

    - name: 11. Enable rke2 server
      ansible.builtin.systemd:
        name: rke2-server
        state: started
        enabled: true
    
    - name: 12. Create .kube directory for user
      ansible.builtin.file:
        path: "/home/{{ admin_user }}/.kube"
        state: directory
        mode: '0755'
        owner: "{{ admin_user }}"

    - name: 13. Copy cluster kubeconfig to local user
      ansible.builtin.copy:
        src: /etc/rancher/rke2/rke2.yaml
        dest: "/home/{{ admin_user }}/.kube/config"
        remote_src: true
        mode: '0600'
        owner: "{{ admin_user }}"

    - name: 14. Add rke2 to path
      ansible.builtin.lineinfile:
        path: "/home/{{ admin_user }}/.bashrc"
        line: "export PATH=$PATH:/var/lib/rancher/rke2/bin"
        create: true
        mode: '0644'
        owner: "{{ admin_user }}"

    - name: 15. Install Helm 4
      ansible.builtin.shell: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-4 | bash
      args:
        creates: /usr/local/bin/helm
    
    - name: 16. Retrieve RKE2 node token
      ansible.builtin.slurp:
        src: /var/lib/rancher/rke2/server/node-token
      register: rke2_token_file

    - name: 17. Print the RKE2 node token
      ansible.builtin.debug:
        msg: "RKE2 Node Token is: {{ rke2_token_file.content | b64decode | trim }}"