apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-metrics
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://victoriametrics.github.io/helm-charts/
    chart: victoria-metrics-single
    targetRevision: 0.41.0
    helm:
      values: |
        fullnameOverride: "victoria-metrics"
        
        server:
          service:
            servicePort: 8428
            name: http
          
          persistentVolume:
            enabled: true
            size: 5Gi
            storageClassName: "longhorn"
            accessModes:
              - ReadWriteOnce
              
          retentionPeriod: "1"
          
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 512Mi

        serviceMonitor:
          enabled: false
          
  destination:
    server: https://kubernetes.default.svc
    namespace: victoria
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true