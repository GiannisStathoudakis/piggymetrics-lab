apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: lab-gateway
  namespace: gateway 
  annotations:
    cert-manager.io/cluster-issuer: vault-issuer
    argocd.argoproj.io/sync-wave: "4"
spec:
  gatewayClassName: cilium 
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    hostname: "*.lab.internal"
    allowedRoutes:
      namespaces:
        from: All
        
  - name: https
    protocol: HTTPS
    port: 443
    hostname: "*.lab.internal"
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
      - name: lab-wildcard-tls