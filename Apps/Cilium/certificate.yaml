apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lab-wildcard-tls
  namespace: gateway
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  secretName: lab-wildcard-tls
  issuerRef:
    name: vault-issuer
    kind: ClusterIssuer
  commonName: "*.lab.internal"
  dnsNames:
  - "*.lab.internal"