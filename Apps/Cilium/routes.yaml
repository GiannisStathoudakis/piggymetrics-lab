# -----------------------------
# Vault Routing
# -----------------------------
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vault-route
  namespace: vault
spec:
  parentRefs:
  - name: lab-gateway
    namespace: gateway 
  hostnames: ["vault.lab.internal"]
  rules:
  - backendRefs:
    - name: vault
      port: 8200
---
# -----------------------------
# Hubble Routing
# -----------------------------
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hubble-route
  namespace: kube-system
spec:
  parentRefs:
  - name: lab-gateway
    namespace: gateway
  hostnames: ["hubble.lab.internal"]
  rules:
  - backendRefs:
    - name: hubble-ui
      port: 80
    timeouts:
      request: 3600s
---
