apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://helm.cilium.io/
    chart: cilium
    targetRevision: 1.19.5
    helm:
      values: |
        kubeProxyReplacement: "true"
        k8sServiceHost: 192.168.80.131
        k8sServicePort: 6443

        gatewayAPI:
          enabled: true

        encryption:
          enabled: true
          type: wireguard

        l7Proxy: true
        envoy:
          enabled: true

        #LoadBalancer
        l2announcements:
          enabled: true
        externalIPs:
          enabled: true

        hubble:
          relay:
            enabled: true
          ui:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true