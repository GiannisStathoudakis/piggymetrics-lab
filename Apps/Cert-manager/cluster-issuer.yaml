apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: vault-issuer
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  vault:
    server: http://vault.vault.svc:8200
    path: pki_int/sign/lab-internal-role
    auth:
      kubernetes:
        mountPath: /v1/auth/kubernetes
        role: cert-manager-role
        serviceAccountRef:
          name: cert-manager