apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: garage
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://git.deuxfleurs.fr/Deuxfleurs/garage.git
    targetRevision: HEAD
    path: script/helm/garage
    helm:
      values: |
        deployment:
          replicaCount: 1
        garage:
          replicationFactor: 1
        persistence:
          meta:
            storageClass: "longhorn"
            size: 1Gi
          data:
            storageClass: "longhorn"
            size: 20Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: garage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:  
      - CreateNamespace=true