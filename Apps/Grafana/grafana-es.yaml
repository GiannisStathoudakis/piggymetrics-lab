apiVersion: external-secrets.io/v1 
kind: ExternalSecret
metadata:
  name: grafana-admin-secret
  namespace: grafana
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: grafana-admin-credentials
  data:
  - secretKey: admin-user
    remoteRef:
      key: secret/grafana
      property: admin-user
  - secretKey: admin-password
    remoteRef:
      key: secret/grafana
      property: admin-password