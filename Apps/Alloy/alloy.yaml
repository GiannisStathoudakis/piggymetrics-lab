apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: alloy
    targetRevision: 1.10.0 
    helm:
      values: |
        controller:
          type: deployment
          replicas: 1

        alloy:
          rbac:
            create: true
          extraClusterRoleRules:
            - apiGroups: [""]
              resources: ["pods", "pods/log"]
              verbs: ["get", "list", "watch"]
              
          configMap:
            content: |-
              // ==========================================
              // VictoriaMetrics
              // ==========================================
              discovery.kubernetes "endpoints" {
                role = "endpoints"
              }
              
              discovery.relabel "node_exporter" {
                targets = discovery.kubernetes.endpoints.targets
                rule {
                  source_labels = ["__meta_kubernetes_service_name"]
                  regex         = "node-exporter"
                  action        = "keep"
                }
              }
              
              prometheus.scrape "node_exporter" {
                targets         = discovery.relabel.node_exporter.output
                scrape_interval = "15s"
                forward_to      = [prometheus.remote_write.victoriametrics.receiver]
              }
              
              prometheus.remote_write "victoriametrics" {
                endpoint {
                  url = "http://victoria-metrics-server.victoria.svc.cluster.local:8428/api/v1/write"
                }
              }

              // ==========================================
              // Loki
              // ==========================================
              discovery.kubernetes "pods" {
                role = "pod"
              }
              
              discovery.relabel "pod_logs" {
                targets = discovery.kubernetes.pods.targets                
                
                rule {
                  source_labels = ["__meta_kubernetes_namespace"]
                  target_label  = "namespace"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_name"]
                  target_label  = "pod"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_container_name"]
                  target_label  = "container"
                }
              }
              
              loki.source.kubernetes "pod_logs" {
                targets    = discovery.relabel.pod_logs.output
                forward_to = [loki.write.loki.receiver]
              }
              
              loki.write "loki" {
                endpoint {
                  url = "http://loki.loki.svc.cluster.local:3100/loki/api/v1/push"
                }
              }

              // ==========================================
              // Tempo & VictoriaMetrics
              // ==========================================
              otelcol.receiver.otlp "default" {
                grpc { endpoint = "0.0.0.0:4317" }
                http { endpoint = "0.0.0.0:4318" }
                output {
                  traces  = [otelcol.exporter.otlp.tempo.input]
                  metrics = [otelcol.exporter.prometheus.to_victoriametrics.input]
                }
              }
              
              otelcol.exporter.otlp "tempo" {
                client {
                  endpoint = "tempo.tempo.svc.cluster.local:4317"
                  tls {
                    insecure             = true
                    insecure_skip_verify = true
                  }
                }
              }

              otelcol.exporter.prometheus "to_victoriametrics" {
                forward_to = [prometheus.remote_write.victoriametrics.receiver]
              }
              
  destination:
    server: https://kubernetes.default.svc
    namespace: grafana
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true