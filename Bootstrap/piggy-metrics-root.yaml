apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: piggymetrics
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/GiannisStathoudakis/piggymetrics-fork.git'
    targetRevision: HEAD
    path: chart
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: piggymetrics
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true