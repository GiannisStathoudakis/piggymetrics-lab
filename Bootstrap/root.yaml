apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-addons
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - app: vault
            path: Apps/Vault
          - app: cert-manager
            path: Apps/Cert-manager
          - app: eso
            path: Apps/External-Secrets
          - app: cilium
            path: Apps/Cilium
          - app: argocd
            path: Apps/Argocd
          - app: longhorn
            path: Apps/Longhorn
          - app: grafana
            path: Apps/Grafana
          - app: garage
            path: Apps/Garage
          - app: loki
            path: Apps/Loki
          - app: victoria-metrics
            path: Apps/VictoriaMetrics
          - app: node-exporter
            path: Apps/Node-exporter

  template:
    metadata:
      name: '{{app}}-root'
    spec:
      project: default
      source:
        repoURL: git@github.com:GiannisStathoudakis/piggymetrics-lab.git
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: true
          selfHeal: true