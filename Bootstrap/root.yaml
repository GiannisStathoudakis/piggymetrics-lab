apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-addons
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - app: vault
            path: Apps/Vault
          - app: cert-manager
            path: Apps/Cert-manager
          - app: eso
            path: Apps/External-Secrets

  template:
    metadata:
      name: '{{app}}-root'
    spec:
      project: default
      source:
        repoURL: git@github.com:GiannisStathoudakis/piggymetrics-lab.git
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: true
          selfHeal: true